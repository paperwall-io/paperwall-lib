# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Run tests
on:
  push:
    branch: [main]

jobs:
  verify-contracts:
    name: Verify against api - ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.45
      - run: bun install
      - run: bun run test:contract

      - name: Publish pacts to broker
        if: ${{ vars.PACT_BROKER_URL != '' }}
        run: |
          for pact_file in pacts/*.json; do
            echo "Publishing $pact_file..."
            curl --fail -X PUT \
              -H "Content-Type: application/json" \
              -u "${{ vars.PACT_BROKER_USERNAME }}:${{ secrets.PACT_BROKER_PASSWORD }}" \
              -d @"$pact_file" \
              "${{ vars.PACT_BROKER_URL }}/pacts/provider/paperwall-api/consumer/paperwall-lib/version/${{ github.sha }}?tag=${{ github.ref_name }}"
          done

      - name: Can I deploy?
        if: ${{ vars.PACT_BROKER_URL != '' }}
        run: |
          docker run --rm pactfoundation/pact-cli:latest \
            broker can-i-deploy \
            --pacticipant paperwall-lib \
            --version ${{ github.sha }} \
            --broker-base-url ${{ vars.PACT_BROKER_URL }} \
            --broker-username ${{ vars.PACT_BROKER_USERNAME }} \
            --broker-password ${{ secrets.PACT_BROKER_PASSWORD }}
