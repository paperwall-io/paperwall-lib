name: Run Tests

on:
  push:
    branches:
      - main

env:
  API_IMAGE: ghcr.io/paperwall-io/paperwall-api:latest

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download harness
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          mkdir -p .harness
          gh api repos/paperwall-io/paperwall-harness/tarball/main > harness.tar.gz
          tar xz -C .harness --strip-components=1 < harness.tar.gz
          rm harness.tar.gz

      - name: Start API and database
        working-directory: .harness
        run: |
          echo "${{ secrets.CROSS_REPO_TOKEN }}" | docker login ghcr.io -u x --password-stdin
          docker compose up -d --wait

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run tests
        run: bun run test
        env:
          API_BASE_URL: http://localhost:3003

      - name: Stop services
        if: always()
        working-directory: .harness
        run: docker compose down
